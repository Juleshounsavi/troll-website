<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Clique pour gagner 🎁</title>

  <!-- Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

  <style>
    :root {
      --bg1: #0f0f0f;
      --bg2: #1a1a1a;
      --card: #ffffffee;
      --yes: #22c55e;
      --yesHover: #16a34a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100svh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, var(--bg2), var(--bg1));
      font-family: system-ui, sans-serif;
      overflow: hidden;
      padding: 16px;
      transition: background 0.2s;
    }
    footer {
      background-color: #222;
      color: white;
      text-align: center;
      padding: 15px;
      position: fixed;
      bottom: 0;
      width: 100%;
      font-family: Arial, sans-serif;
    }

    body.panic {
      animation: flash 0.6s infinite;
    }

    @keyframes flash {
      0% { background: #000; }
      50% { background: #7f0000; }
      100% { background: #000; }
    }

    #confettiCanvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
    }

    .card {
      width: min(720px, 92vw);
      padding: 30px 24px;
      background: var(--card);
      border-radius: 22px;
      text-align: center;
      box-shadow: 0 18px 60px rgba(0,0,0,.4);
    }

    h1 {
      font-size: clamp(26px, 4vw, 44px);
      margin-bottom: 12px;
    }

    p {
      opacity: .8;
    }

    .button-zone {
      position: relative;
      width: min(520px, 92%);
      height: 160px;
      margin: 24px auto 0;
      touch-action: none;
    }

    button {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      padding: 16px 26px;
      font-size: 18px;
      font-weight: 800;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(0,0,0,.25);
      user-select: none;
      transition: transform .12s ease, background .12s ease;
    }

    #yesBtn {
      left: 18%;
      background: var(--yes);
      color: #fff;
    }
    #yesBtn:hover { background: var(--yesHover); }

    #noBtn {
      left: 62%;
      background: #e5e7eb;
      color: #111827;
    }

    .countdown {
      display: none;
      margin-top: 20px;
    }

    .countdown h2 {
      color: red;
      font-size: clamp(28px, 5vw, 42px);
    }

    #timer {
      font-size: 72px;
      font-weight: 900;
      color: red;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <canvas id="confettiCanvas"></canvas>

  <main class="card">
    <h1>Clique pour gagner un iPhone 17 Pro Max Ultra</h1>
    <p>Offre limitée. 100% réelle. Totalement fiable.</p>

    <section class="button-zone" id="zone">
      <button id="yesBtn">Gagner</button>
      <button id="noBtn">Refuser</button>
    </section>

    <section class="countdown" id="countdown">
      <h2>⚠️ ALERTE SYSTÈME</h2>
      <p>Surcharge critique détectée</p>
      <div id="timer">10</div>
    </section>
  </main>

  <script>
    const zone = document.getElementById("zone");
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const countdown = document.getElementById("countdown");
    const timer = document.getElementById("timer");

    /* ---------- CONFETTI ---------- */
    const confettiCanvas = document.getElementById("confettiCanvas");

    function resizeCanvas() {
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      confettiCanvas.width = innerWidth * dpr;
      confettiCanvas.height = innerHeight * dpr;
      confettiCanvas.style.width = "100vw";
      confettiCanvas.style.height = "100vh";
    }

    resizeCanvas();
    addEventListener("resize", resizeCanvas);

    const confettiInstance = confetti.create(confettiCanvas, {
      resize: false,
      useWorker: true
    });

    function fullConfetti() {
      confettiInstance({
        particleCount: 300,
        spread: 140,
        startVelocity: 60,
        origin: { x: 0.5, y: 0.5 }
      });
    }

    /* ---------- BEEP ---------- */
    function beep(freq = 800, duration = 120) {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();

      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = "square";
      osc.start();

      setTimeout(() => {
        osc.stop();
        ctx.close();
      }, duration);
    }

    /* ---------- NO BUTTON RUNS ---------- */
    function clamp(n, min, max) {
      return Math.max(min, Math.min(max, n));
    }

    function moveNo(x, y) {
      const z = zone.getBoundingClientRect();
      const b = noBtn.getBoundingClientRect();

      let dx = (b.left + b.width / 2) - x;
      let dy = (b.top + b.height / 2) - y;
      let mag = Math.hypot(dx, dy) || 1;
      dx /= mag;
      dy /= mag;

      let left = (b.left - z.left) + dx * 140;
      let top  = (b.top - z.top) + dy * 140;

      left = clamp(left, 0, z.width - b.width);
      top  = clamp(top, 0, z.height - b.height);

      noBtn.style.left = left + "px";
      noBtn.style.top = top + "px";
      noBtn.style.transform = "none";
    }

    zone.addEventListener("pointermove", e => {
      const b = noBtn.getBoundingClientRect();
      const d = Math.hypot(
        (b.left + b.width / 2) - e.clientX,
        (b.top + b.height / 2) - e.clientY
      );
      if (d < 140) moveNo(e.clientX, e.clientY);
    });

    noBtn.addEventListener("click", e => e.preventDefault());

    /* ---------- YES CLICK (PANIC MODE) ---------- */
    yesBtn.addEventListener("click", () => {
      zone.style.display = "none";
      countdown.style.display = "block";
      document.body.classList.add("panic");

      let t = 10;
      timer.textContent = t;

      const interval = setInterval(() => {
        beep(600 + t * 50);
        timer.textContent = t;
        t--;

        if (t < 0) {
          clearInterval(interval);
          document.body.classList.remove("panic");
          countdown.innerHTML = `
            <h2>Tu y crois toi 😂​​?</h2>
            <h2>Fais gaffe.</h2>
            <p>.</p>
          `;
          fullConfetti();
        }
      }, 1000);
    });
  </script>
  <footer>
    <p>&copy; 2026 JKoffi — Tous droits réservés.</p>
  </footer>
</body>
</html>
